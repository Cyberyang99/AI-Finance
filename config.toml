[agent]
model = "deepseek-v4-flash"
max_tokens = 16384
thinking = false
temperature = 0.3

[paths]
memory_dir = "memory"
output_dir = "~/Desktop"

[scan]
# 横向扫描默认参数
top_n = 10          # 最多对比多少只
min_mcap = 50       # 最低市值限制(亿)

[deep]
# 个股深度分析默认参数
history_years = 5   # 回溯多少年财务数据

[review]
# 定期回顾设置
auto_review_days = 90  # 多少天后自动触发回顾提醒

[cot]
# 提取 CoT 专用模型。曾试 deepseek-v4-pro 但调用一直卡住（pro 别名在网关上慢/未正确映射），
# 退回 flash —— 227 条历史 CoT 全是 flash 跑的，质量提升靠 prompt（原文依据/证伪维/放开截断），与模型无关。
# 待确认 pro 别名可用后可再切回。
extract_model = "deepseek-v4-flash"
# 单块提取字符上限，超出自动按段落分块再汇总，不再静默截断丢失后半篇。
max_chars = 100000

[cot.score_weights]
# signal = transmission*W_T + falsifiability*W_F + history*W_H + recency*W_R (自动归一化)
# falsifiability(可证伪性)给足权重，才能把"一家之言"软论断压下去
transmission   = 0.35
falsifiability = 0.30
history        = 0.20
recency        = 0.15
