[agent]
model = "claude-sonnet-4-6"
max_tokens = 16384
thinking = false
temperature = 0.3

[paths]
memory_dir = "memory"
output_dir = "~/Desktop"

[scan]
# 横向扫描默认参数
top_n = 10          # 最多对比多少只
min_mcap = 50       # 最低市值限制(亿)

[deep]
# 个股深度分析默认参数
history_years = 5   # 回溯多少年财务数据

[review]
# 定期回顾设置
auto_review_days = 90  # 多少天后自动触发回顾提醒
