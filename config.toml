[agent]
model = "deepseek-v4-flash"
max_tokens = 16384
thinking = false
temperature = 0.3

[paths]
memory_dir = "memory"
output_dir = "~/Desktop"

[scan]
# 横向扫描默认参数
top_n = 10          # 最多对比多少只
min_mcap = 50       # 最低市值限制(亿)

[deep]
# 个股深度分析默认参数
history_years = 5   # 回溯多少年财务数据

[review]
# 定期回顾设置
auto_review_days = 90  # 多少天后自动触发回顾提醒

[cot]
[cot.score_weights]
# signal = transmission*W_T + falsifiability*W_F + history*W_H + recency*W_R (自动归一化)
# falsifiability(可证伪性)给足权重，才能把"一家之言"软论断压下去
transmission   = 0.35
falsifiability = 0.30
history        = 0.20
recency        = 0.15
