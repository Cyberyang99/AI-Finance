      7nm, 5nm, 3nm, 2nm, 18A, 14A, 先进制程, A16,
      # ── 半导体设备 ──
      光刻机, EUV, High-NA EUV, ASML, 应用材料, AMAT, Lam Research, 拉姆研究, 东京电子, TEL, KLA, 科林研发,
      中微公司, 北方华创, 拓荆科技, 盛美上海, 沪硅产业, 长川科技, 华峰测控, 万业企业, 中科飞测, 至纯科技,
