      AI算力, AI 算力, 算力, AI芯片, 算力芯片, 算力卡, AI加速卡, AI Chip, AI Accelerator,
      GPU, NPU, CPU, TPU, LPU, DPU, FPGA, ASIC, 服务器CPU, 训练芯片, 推理芯片, AI训练, AI推理,
      SRAM, 寄存器, on-chip cache, L3 cache,
      # ── 具体型号 ──
      H100, H200, B100, B200, B300, GB200, GB300, MI300, MI350, MI355, Blackwell, Hopper, Rubin,
      # ── 先进封装 ──
      CoWoS, SoIC, Chiplet, 先进封装, 2.5D封装, 3D封装, FOPLP, FOWLP, FCBGA, FOCoS, HBM封装,
      日月光, 长电科技, 通富微电, Amkor, JCET,
