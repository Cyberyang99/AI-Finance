  # ── 投资主题 (10 大用户研究主题) ──
  # 设计：每个主题颗粒度比 GICS 二级更细，专门反映投资视角；可多选。
  # 强制 LLM 选具体细分（如 AI 算力/存储/互联/大模型），不留"AI 总主题"粗匣。

