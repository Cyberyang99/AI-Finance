# fa CoT 主板块清单
#
# 设计：
#   - 31 个主板块 = GICS 11×2 共 24 个 industry group + 7 个中国/全球特色主题
#   - 每个 sector 有 id（英文，目录名）、name_cn（中文显示）、parent（GICS 一级或 Theme）、aliases（同义词）
#   - aliases 用于 fa 解析用户/LLM 输入：模糊匹配命中后归一到这个标准 id
#
# 修改约定：
#   1. id 是目录名，一旦写了就别改（会让旧 CoT 文件错位）。要改 id 等于"重命名板块"，需要迁移
#   2. aliases 可以随时增删
#   3. 想新增板块：直接加一节，重启 fa 即可生效
#
# 一级行业 = parent，二级 = sector（实际归类到这一级）

version: 1

sectors:
  # ── GICS Energy ──
  Energy:
    name_cn: 能源
    parent: Energy
    aliases: [能源, 油气, 石油, oil_gas, oil, gas, petroleum, 油气勘探]
    desc: 油气勘探与开采、石油设备与服务

  # ── GICS Materials ──
  Materials:
    name_cn: 原材料
    parent: Materials
    aliases: [原材料, 化工, 化学品, 钢铁, 有色金属, 建材, 金属采矿, materials, 纸品包装]
    desc: 化工、建材、金属采矿、纸品包装

  # ── GICS Industrials (3 个 industry group) ──
  CapitalGoods:
    name_cn: 资本品
    parent: Industrials
    aliases: [资本品, 机械, 工业机械, 电气设备, 建筑工程, capital_goods, 装备制造, 航空航天, 国防, 模具, 工程机械, 重工]
    desc: 工业机械、电气设备、航空航天与国防、建筑产品、模具

  CommercialServices:
    name_cn: 商业与专业服务
    parent: Industrials
    aliases: [商业服务, 专业服务, 人力资源, 安保, 咨询, commercial_services]
    desc: 人力资源、研究咨询、安保、办公服务

  Transportation:
